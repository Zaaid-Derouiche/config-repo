spring.application.name=gateway-service
server.port=9999

spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.register=false

# ========== JWT CONFIGURATION ==========
jwt.secret=${JWT_SECRET:temporarySecretForDev}
jwt.expiration=${JWT_EXPIRATION:600000000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:30000000000}

# ========== DISCOVERY LOCATOR ACTIF ==========
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ========== ACTUATOR CONFIGURATION ==========
management.endpoints.web.exposure.include=gateway,health,info,metrics
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

spring.webflux.static-path-pattern=/static/**

spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=60000
spring.cloud.gateway.httpclient.pool.max-connections=1000
spring.cloud.gateway.httpclient.pool.acquire-timeout=45000