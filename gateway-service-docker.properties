spring.application.name=gateway-service
server.port=9999

# Consul (dynamique)
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}

# ========== JWT CONFIGURATION ==========
jwt.secret=${JWT_SECRET:temporarySecretForDev}
jwt.expiration=${JWT_EXPIRATION:600000000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:30000000000}

# Activer discovery pour router automatiquement
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


# ?? Dťsactiver COMPL»TEMENT le retry ??????????????????????
spring.cloud.gateway.default-filters[0].name=Retry
spring.cloud.gateway.default-filters[0].args.retries=0
spring.cloud.gateway.default-filters[0].args.methods=GET
spring.cloud.gateway.default-filters[0].args.series=SERVER_ERROR

# ?? Dťsactiver aussi le retry du LoadBalancer ??????????????
spring.cloud.loadbalancer.retry.enabled=false