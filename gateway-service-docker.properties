spring.application.name=gateway-service
server.port=9999

# Consul (dynamique)
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}

# ========== JWT CONFIGURATION ==========
jwt.secret=${JWT_SECRET:temporarySecretForDev}
jwt.expiration=${JWT_EXPIRATION:600000000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:30000000000}

# Activer discovery pour router automatiquement
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ========== ACTUATOR CONFIGURATION ==========
management.endpoints.web.exposure.include=gateway,health,info,metrics
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always

# ?? IMPORTANT: Forcer le prťfixe /actuator
management.endpoints.web.base-path=/actuator

# Dťsactiver le routing des ressources statiques pour /actuator
spring.webflux.static-path-pattern=/static/**